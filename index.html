<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat By Kartikeya</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        #chat-container { display: none; flex: 1; height: 100%; overflow: hidden; }
        #sidebar { width: 260px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: #25D366; }
        .offline { background: #bbb; }
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        header { background: #075e54; color: white; padding: 15px; font-weight: bold; }
        #clear-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; float: right; cursor: pointer; font-size: 11px; display: none; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; display: flex; flex-direction: column; }
        .privacy-note { background: #fff3cd; color: #856404; font-size: 11px; padding: 8px; text-align: center; border-top: 1px solid #ffeeba; display: none; }
        #form { display: flex; padding: 10px; background: #f0f0f0; align-items: center; }
        #chat-input { flex: 1; border: none; padding: 12px; border-radius: 25px; outline: none; margin: 0 10px; }
        .msg-box { padding: 10px; border-radius: 8px; margin-bottom: 5px; max-width: 70%; position: relative; word-wrap: break-word; }
        .delete-btn { position: absolute; top: -8px; right: -8px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 9px; display: none; }
        .msg-box:hover .delete-btn { display: block; }
        .save-btn { display: block; background: #075e54; color: white; text-align: center; padding: 5px; margin-top: 5px; border-radius: 4px; font-size: 11px; cursor: pointer; text-decoration: none; border: none; width: 100%; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-box">
            <h2>Login to continue...</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="authAction()" style="width:95%; padding:10px; background:#075e54; color:white; border:none; cursor:pointer;">Login / Register</button>
            <p id="error-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="chat-container">
        <div id="sidebar"><div style="padding:15px; background:#eee; font-weight:bold;">Users</div><div id="user-list"></div></div>
        <div id="main-chat">
            <header><span id="header-text">Select User</span><button id="clear-btn" onclick="clearAllChat()">Clear History</button></header>
            <ul id="messages"></ul>
            <div class="privacy-note" id="privacy-banner">⚠️ Images NOT saved in history. Download to save.</div>
            <form id="form" style="display:none;">
                <input type="file" id="file-input" accept="image/*" style="display:none;">
                <button type="button" onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:20px; cursor:pointer;">📎</button>
                <input id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit" style="background:#075e54; color:white; border:none; padding:10px 15px; border-radius:20px;">SEND</button>
            </form>
        </div>
    </div>

    <script src="https://simplechat-9zs6.onrender.com/socket.io/socket.io.js"></script>
    <script>
        const API_URL = "https://simplechat-9zs6.onrender.com"; 
        const socket = io(API_URL, { 
            autoConnect: false,
            transports: ['websocket', 'polling']
        });
        let currentUser = "", selectedUser = "";

        async function authAction() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert("Fill fields");

            try {
                let res = await fetch(`${API_URL}/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                if (!res.ok) {
                    res = await fetch(`${API_URL}/register`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user, password: pass })
                    });
                }

                const data = await res.json();
                if (res.ok) {
                    currentUser = user;
                    startChat();
                } else {
                    document.getElementById('error-msg').innerText = data.error;
                }
            } catch (err) {
                alert("Server is still waking up. Please try again in 30 seconds.");
            }
        }

        function startChat() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            socket.connect();
            socket.emit('join', currentUser);
            loadUsers();
        }

        // Automatic list update when a new user registers
        socket.on('user registered', () => {
            loadUsers();
        });

        async function loadUsers() {
            const res = await fetch(`${API_URL}/users`);
            const users = await res.json();
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            users.forEach(u => {
                if (u.username !== currentUser) {
                    const div = document.createElement('div');
                    div.className = 'user-item'; div.id = `user-${u.username}`;
                    div.innerHTML = `<span>${u.username}</span> <div class="status-dot ${u.isOnline ? 'online' : 'offline'}"></div>`;
                    div.onclick = () => selectUser(u.username, div);
                    list.appendChild(div);
                }
            });
        }

        socket.on('status change', (d) => {
            const el = document.getElementById(`user-${d.username}`);
            if (el) el.querySelector('.status-dot').className = `status-dot ${d.status === 'online' ? 'online' : 'offline'}`;
        });

        function selectUser(targetUser, el) {
            selectedUser = targetUser;
            document.querySelectorAll('.user-item').forEach(i => i.style.background = "white");
            el.style.background = "#dcf8c6";
            document.getElementById('header-text').innerText = "Chat with " + targetUser;
            document.getElementById('clear-btn').style.display = 'block';
            document.getElementById('form').style.display = 'flex';
            document.getElementById('privacy-banner').style.display = 'block';
            document.getElementById('messages').innerHTML = "";
            socket.emit('get history', { from: currentUser, to: selectedUser });
        }

        socket.on('load history', (h) => h.forEach(m => addMsg(m.from, m.text, m._id)));
        socket.on('new message', (d) => { if (d.from === selectedUser || d.to === selectedUser) addMsg(d.from, d.text, d._id); });
        socket.on('message deleted', (id) => { const m = document.getElementById(id); if (m) m.remove(); });
        socket.on('history cleared', () => { document.getElementById('messages').innerHTML = ""; });

        function addMsg(u, t, id) {
            const li = document.createElement('li');
            li.className = 'msg-box'; li.id = id;
            li.style.background = u === currentUser ? "#dcf8c6" : "white";
            li.style.alignSelf = u === currentUser ? "flex-end" : "flex-start";
            let del = u === currentUser ? `<button class="delete-btn" onclick="socket.emit('delete message', '${id}')">✕</button>` : "";
            if (t.startsWith('data:image')) {
                li.innerHTML = `${del}<strong>${u}</strong><br><img src="${t}" style="max-width:100%;"><button class="save-btn" onclick="downloadImg('${t}')">Save</button>`;
            } else {
                li.innerHTML = `${del}<strong>${u}:</strong> ${t}`;
            }
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function downloadImg(str) {
            const a = document.createElement('a'); a.href = str; a.download = `img_${Date.now()}.png`; a.click();
        }

        function clearAllChat() {
            if(confirm(`Clear history with ${selectedUser}?`)) socket.emit('clear history', { from: currentUser, to: selectedUser });
        }

        document.getElementById('file-input').onchange = function() {
            const r = new FileReader(); 
            r.onload = (e) => socket.emit('private message', { from: currentUser, to: selectedUser, text: e.target.result });
            r.readAsDataURL(this.files[0]);
        };

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault(); const i = document.getElementById('chat-input');
            if (i.value && selectedUser) { socket.emit('private message', { from: currentUser, to: selectedUser, text: i.value }); i.value = ''; }
        };
    </script>
</body>
</html>
