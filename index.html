<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat By Kartikeya</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #chat-container { display: none; flex: 1; height: 100%; overflow: hidden; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .user-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; flex-direction: column; }
        .user-info { display: flex; justify-content: space-between; align-items: center; }
        .last-msg { font-size: 12px; color: #777; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: #25D366; }
        .offline { background: #bbb; }
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #typing-status { font-size: 12px; font-weight: normal; color: #dcf8c6; margin-left: 8px; font-style: italic; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; display: flex; flex-direction: column; }
        .msg-box { padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 70%; position: relative; font-size: 14px; }
        .timestamp { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 4px; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 9px; display: none; }
        .msg-box:hover .delete-btn { display: block; }
        #form { display: flex; padding: 10px; background: #f0f0f0; align-items: center; }
        #chat-input { flex: 1; border: none; padding: 12px; border-radius: 25px; outline: none; margin: 0 10px; }
        .save-btn { display: block; background: #075e54; color: white; text-align: center; padding: 4px; margin-top: 5px; border-radius: 4px; font-size: 11px; text-decoration: none; cursor: pointer; }
        input[type="text"], input[type="password"] { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button#clear-btn { background: #ff4d4d; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-box">
            <h2>Login to continue...</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="authAction()" style="width:95%; padding:10px; background:#075e54; color:white; border:none; border-radius:5px; cursor:pointer;">Enter Chat</button>
            <p id="error-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="chat-container">
        <div id="sidebar"><div style="padding:15px; background:#eee; font-weight:bold;">Messages</div><div id="user-list"></div></div>
        <div id="main-chat">
            <header>
                <div><strong id="header-name">Select User</strong><span id="typing-status"></span></div>
                <button id="clear-btn" style="display:none;" onclick="clearAllChat()">Clear Chat</button>
            </header>
            <ul id="messages"></ul>
            <form id="form" style="display:none;">
                <input type="file" id="file-input" accept="image/*" style="display:none;">
                <button type="button" onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:22px; cursor:pointer;">📎</button>
                <input id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit" style="background:#075e54; color:white; border:none; padding:10px 18px; border-radius:20px; cursor:pointer;">SEND</button>
            </form>
        </div>
    </div>

    <script src="https://simplechat-9zs6.onrender.com/socket.io/socket.io.js"></script>
    <script>
        const API_URL = "https://simplechat-9zs6.onrender.com"; 
        const socket = io(API_URL, { autoConnect: false, transports: ['websocket', 'polling'] });
        let currentUser = "", selectedUser = "", typingTimeout;

        async function authAction() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return;
            try {
                let res = await fetch(`${API_URL}/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (!res.ok) res = await fetch(`${API_URL}/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (res.ok) { currentUser = user; startChat(); }
                else { const d = await res.json(); document.getElementById('error-msg').innerText = d.error; }
            } catch (e) { alert("Server is waking up... try again in 10s."); }
        }

        function startChat() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            socket.connect();
            socket.emit('join', currentUser);
            loadUsers();
        }

        async function loadUsers() {
            const res = await fetch(`${API_URL}/users`);
            const users = await res.json();
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            users.forEach(u => {
                if (u.username !== currentUser) {
                    const div = document.createElement('div');
                    div.className = 'user-item'; div.id = `user-${u.username}`;
                    const snippet = u.lastSnippet || "No messages yet";
                    div.innerHTML = `
                        <div class="user-info"><strong>${u.username}</strong><div class="status-dot ${u.isOnline ? 'online' : 'offline'}"></div></div>
                        <div class="last-msg">${snippet}</div>
                    `;
                    div.onclick = () => selectUser(u.username, div);
                    list.appendChild(div);
                }
            });
        }

        function selectUser(target, el) {
            selectedUser = target;
            document.querySelectorAll('.user-item').forEach(i => i.style.background = "white");
            el.style.background = "#dcf8c6";
            document.getElementById('header-name').innerText = target;
            document.getElementById('clear-btn').style.display = 'block';
            document.getElementById('form').style.display = 'flex';
            document.getElementById('messages').innerHTML = "";
            socket.emit('get history', { from: currentUser, to: selectedUser });
        }

        document.getElementById('chat-input').addEventListener('input', () => {
            socket.emit('typing', { from: currentUser, to: selectedUser });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => socket.emit('stop typing', { from: currentUser, to: selectedUser }), 2000);
        });

        socket.on('user typing', (d) => { if(d.from === selectedUser) document.getElementById('typing-status').innerText = " typing..."; });
        socket.on('user stop typing', (d) => { if(d.from === selectedUser) document.getElementById('typing-status').innerText = ""; });
        socket.on('refresh sidebar', loadUsers);
        socket.on('user registered', loadUsers);
        socket.on('status change', loadUsers);
        socket.on('load history', (h) => h.forEach(m => addMsg(m.from, m.text, m._id, m.timestamp)));
        socket.on('new message', (d) => { if (d.from === selectedUser || d.to === selectedUser) addMsg(d.from, d.text, d._id, d.timestamp); });
        socket.on('message deleted', (id) => { const m = document.getElementById(id); if (m) m.remove(); });
        socket.on('history cleared', () => { document.getElementById('messages').innerHTML = ""; });

        function addMsg(u, t, id, time) {
            const li = document.createElement('li');
            li.className = 'msg-box'; li.id = id;
            li.style.background = u === currentUser ? "#dcf8c6" : "white";
            li.style.alignSelf = u === currentUser ? "flex-end" : "flex-start";
            let del = u === currentUser ? `<button class="delete-btn" onclick="socket.emit('delete message', '${id}')">✕</button>` : "";
            const displayTime = new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (t.startsWith('data:image')) {
                li.innerHTML = `${del}<strong>${u}</strong><br><img src="${t}" style="max-width:100%; border-radius:5px;"><a class="save-btn" onclick="downloadImg('${t}')">Save Image</a><span class="timestamp">${displayTime}</span>`;
            } else {
                li.innerHTML = `${del}<strong>${u}:</strong><br>${t}<span class="timestamp">${displayTime}</span>`;
            }
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function downloadImg(str) {
            const a = document.createElement('a'); a.href = str; a.download = `IMG_${Date.now()}.png`; a.click();
        }

        function clearAllChat() {
            if(confirm(`Delete all messages with ${selectedUser}?`)) socket.emit('clear history', { from: currentUser, to: selectedUser });
        }

        document.getElementById('file-input').onchange = function() {
            const r = new FileReader(); r.onload = (e) => socket.emit('private message', { from: currentUser, to: selectedUser, text: e.target.result });
            r.readAsDataURL(this.files[0]);
        };

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault(); const i = document.getElementById('chat-input');
            if (i.value && selectedUser) { socket.emit('private message', { from: currentUser, to: selectedUser, text: i.value }); i.value = ''; }
        };
    </script>
</body>
</html>
